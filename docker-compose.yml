services:
  http-server-projeto-korp:
    build: ./app
    container_name: http-server-projeto-korp
    networks:
      - korp-network
    expose:
      - "8080"

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/http-server-projeto-korp.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - http-server-projeto-korp
    networks:
      - korp-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - http-server-projeto-korp
    networks:
      - korp-network

networks:
  korp-network:
    external: true